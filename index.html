<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Proflex Position Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;
    --surface:#f7f7f5;
    --border:#e0e0e0;
    --gold:#a68a3e;
    --text:#111111;
    --muted:#888;
    --ok:#16a34a;
    --warn:#d97706;
    --crit:#dc2626;
    --breach:#b91c1c;
    --font:'JetBrains Mono',monospace;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}

  /* HEADER */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 24px;border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .logo{color:var(--gold);font-size:13px;font-weight:700;letter-spacing:2px}
  .logo span{color:var(--muted);font-weight:400;margin-left:10px;font-size:11px;letter-spacing:0}
  .header-right{display:flex;align-items:center;gap:16px}
  .ts{color:var(--muted);font-size:10px}
  .pill{font-size:10px;padding:2px 8px;border-radius:2px;background:#efefed;border:1px solid var(--border);color:var(--muted)}
  .refresh-btn{
    background:none;border:1px solid var(--border);color:var(--gold);
    padding:4px 12px;font-family:var(--font);font-size:10px;cursor:pointer;
    border-radius:2px;letter-spacing:1px;transition:all 0.15s;
  }
  .refresh-btn:hover:not(:disabled){border-color:var(--gold);background:#faf6ec}
  .refresh-btn:disabled{opacity:0.5;cursor:not-allowed}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinning{display:inline-block;animation:spin 0.7s linear infinite}

  /* SUMMARY BAR */
  .summary{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface)}
  .sum-item{
    padding:10px 28px;border-right:1px solid var(--border);
    display:flex;flex-direction:column;gap:2px;
  }
  .sum-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .sum-val{font-size:20px;font-weight:700}
  .sum-val.ok{color:var(--ok)}
  .sum-val.warn{color:var(--warn)}
  .sum-val.crit{color:var(--crit)}
  .sum-val.neutral{color:var(--text)}

  /* ALERT BANNER */
  .alert-banner{
    display:none;padding:8px 24px;font-size:11px;
    border-bottom:1px solid var(--border);
    background:#fff5f5;color:var(--crit);letter-spacing:0.5px;
  }

  /* TABLE */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:1100px}
  thead tr{border-bottom:1px solid var(--border)}
  th{
    padding:9px 14px;text-align:left;
    font-size:9px;font-weight:600;
    color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;
    white-space:nowrap;background:var(--surface);
  }
  td{
    padding:14px 14px;border-bottom:1px solid #ececec;
    vertical-align:middle;white-space:nowrap;
  }
  tr:hover td{background:#fafaf8}
  tr.row-critical td{background:#fff5f5}
  tr.row-breached td{background:#fee2e2}
  tr.row-warning td{background:#fffbeb}

  /* CELL TYPES */
  .c-ticker{font-size:14px;font-weight:700;color:#111;display:block}
  .c-sub{font-size:9px;color:var(--muted);display:block;margin-top:2px;letter-spacing:0.3px}
  .c-num{font-size:13px;font-weight:600;color:var(--text)}
  .c-muted{font-size:11px;color:var(--muted)}
  .c-price{font-size:14px;font-weight:700;color:#111}
  .c-be{font-size:12px;font-weight:600;color:var(--text)}
  .c-opt{font-size:12px;font-weight:600;color:var(--text)}

  /* DISTANCE */
  .dist{font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
  .dist.ok{color:var(--ok)}
  .dist.warn{color:var(--warn)}
  .dist.crit{color:var(--crit)}
  .dist.breach{color:var(--breach)}

  /* STATUS BADGE */
  .badge{
    font-size:9px;font-weight:700;letter-spacing:1.5px;
    padding:4px 10px;border-radius:2px;
    display:inline-block;text-transform:uppercase;
  }
  .b-ok{background:#dcfce7;color:var(--ok);border:1px solid #bbf7d0}
  .b-warning{background:#fef3c7;color:var(--warn);border:1px solid #fde68a}
  .b-critical{background:#fee2e2;color:var(--crit);border:1px solid #fca5a5}
  .b-breached{background:var(--breach);color:#fff;border:1px solid var(--breach)}
  .b-error{background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}

  /* DECAY */
  .decay-wrap{display:flex;flex-direction:column;gap:4px}
  .decay-pct{font-size:13px;font-weight:700}
  .decay-pct.d-low{color:var(--muted)}
  .decay-pct.d-mid{color:#2563eb}
  .decay-pct.d-high{color:var(--warn)}
  .decay-pct.d-ripe{color:var(--ok)}
  .decay-bar-bg{height:3px;background:#e5e7eb;border-radius:2px;width:72px}
  .decay-bar-fill{height:3px;border-radius:2px;transition:width 0.3s}
  .decay-bar-fill.d-low{background:#d1d5db}
  .decay-bar-fill.d-mid{background:#93c5fd}
  .decay-bar-fill.d-high{background:var(--warn)}
  .decay-bar-fill.d-ripe{background:var(--ok)}
  .b-harvest{background:#dcfce7;color:var(--ok);border:1px solid #bbf7d0}
  .b-watch{background:#fef3c7;color:var(--warn);border:1px solid #fde68a}

  /* FOOTER */
  footer{padding:16px 24px;color:var(--muted);font-size:9px;letter-spacing:1px;border-top:1px solid var(--border)}

  /* LOADING */
  .loading{padding:60px 24px;color:var(--muted);font-size:11px;letter-spacing:1px}
  .err{padding:12px 24px;color:var(--crit);font-size:11px;background:#fff5f5;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div>
    <span class="logo">PROFLEX <span>/ POSITION MONITOR</span></span>
  </div>
  <div class="header-right">
    <span class="pill">AUTO-REFRESH 60s</span>
    <span class="ts" id="ts">—</span>
    <button class="refresh-btn" id="refresh-btn" onclick="handleRefresh()">↻ REFRESH</button>
  </div>
</header>

<div class="summary">
  <div class="sum-item"><div class="sum-label">Positions</div><div class="sum-val neutral" id="s-total">—</div></div>
  <div class="sum-item"><div class="sum-label">Safe</div><div class="sum-val ok" id="s-ok">—</div></div>
  <div class="sum-item"><div class="sum-label">Warning</div><div class="sum-val warn" id="s-warn">—</div></div>
  <div class="sum-item"><div class="sum-label">Critical</div><div class="sum-val crit" id="s-crit">—</div></div>
  <div class="sum-item"><div class="sum-label">Breached</div><div class="sum-val" style="color:#ff0000" id="s-breach">—</div></div>
  <div class="sum-item"><div class="sum-label">Ripe to Close (70%+)</div><div class="sum-val ok" id="s-ripe">—</div></div>
</div>

<div class="alert-banner" id="alert-banner"></div>
<div id="err"></div>

<div class="table-wrap">
  <div class="loading" id="loading">LOADING POSITIONS...</div>
  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Strategy</th>
        <th>Strike(s)</th>
        <th>Expiry</th>
        <th>Premium</th>
        <th>Breakeven</th>
        <th>Stock Price</th>
        <th>Opt Last</th>
        <th>IV</th>
        <th>Distance</th>
        <th>Decay %</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>PROFLEX FINANCE · INTERNAL USE ONLY · proflexfinance.com</footer>

<script>
const STATUS_URL = "data/status.json";

function rowClass(level) {
  return level === "CRITICAL" ? "row-critical" : level === "BREACHED" ? "row-breached" : level === "WARNING" ? "row-warning" : "";
}

function badgeHtml(level) {
  const map = { OK:"b-ok", WARNING:"b-warning", CRITICAL:"b-critical", BREACHED:"b-breached", ERROR:"b-error" };
  return `<span class="badge ${map[level]||'b-error'}">${level}</span>`;
}

function distHtml(pct, level, riskDir) {
  if (pct === null || pct === undefined) return '<span class="c-muted">—</span>';
  const cls = level === "OK" ? "ok" : level === "WARNING" ? "warn" : level === "BREACHED" ? "breach" : "crit";
  const safe = (riskDir === "downside" && pct >= 0) || (riskDir === "upside" && pct >= 0);
  const arrow = safe ? "↓" : "↑";
  // For downside risk: positive pct = stock above breakeven (good), shown as ↑
  // For upside risk: positive pct = stock below strike (good), shown as ↓
  const displayArrow = riskDir === "downside" ? (pct >= 0 ? "↑" : "↓") : (pct >= 0 ? "↓" : "↑");
  return `<span class="dist ${cls}">${displayArrow} ${pct >= 0 ? "+" : ""}${pct.toFixed(1)}%</span>`;
}

function decayHtml(premiumCollected, optLast) {
  if (!premiumCollected || premiumCollected <= 0 || optLast == null || optLast === 0) {
    return '<span class="c-muted">—</span>';
  }
  const pct = Math.min(((premiumCollected - optLast) / premiumCollected) * 100, 100);
  if (pct < 0) return '<span class="c-muted">—</span>'; // option more expensive than sold — ignore

  const cls = pct >= 70 ? "d-ripe" : pct >= 60 ? "d-high" : pct >= 40 ? "d-mid" : "d-low";
  const barW = Math.min(Math.round(pct), 100);
  const flag = pct >= 70
    ? `<span class="badge b-harvest">HARVEST</span>`
    : pct >= 60
    ? `<span class="badge b-watch">WATCH</span>`
    : "";

  return `<div class="decay-wrap">
    <span class="decay-pct ${cls}">${pct.toFixed(1)}%</span>
    <div class="decay-bar-bg"><div class="decay-bar-fill ${cls}" style="width:${barW}%"></div></div>
    ${flag}
  </div>`;
}

function n(v, prefix="$", decimals=2) {
  if (v === null || v === undefined || v === 0) return '<span class="c-muted">—</span>';
  return `<span class="c-opt">${prefix}${parseFloat(v).toFixed(decimals)}</span>`;
}

function renderRows(positions) {
  return positions.map(p => {
    const s = p.status || {};
    const level = s.alert_level || "ERROR";
    const price = p.current_price != null ? `<span class="c-price">$${p.current_price.toFixed(2)}</span>` : '<span class="c-muted">—</span>';
    const be = s.breakeven_label ? `<span class="c-be">${s.breakeven_label}</span>` : '<span class="c-muted">—</span>';
    const strike = p.strategy === "Bull Put Spread" ? `$${p.strike_high}/$${p.strike_low}` : `$${p.strike || p.strike_high || "—"}`;
    const opt = p.option_data || {};
    const msg = (s.message || "").replace(/"/g, "'");

    return `<tr class="${rowClass(level)}" title="${msg}">
      <td><span class="c-ticker">${p.ticker}</span><span class="c-sub">${p.newsletter||""} · ${p.rating||""}</span></td>
      <td><span class="c-muted">${p.strategy}</span></td>
      <td><span class="c-num">${strike}</span></td>
      <td><span class="c-muted">${p.expiry||"—"}</span></td>
      <td><span class="c-num">$${(p.premium_collected||0).toFixed(2)}</span></td>
      <td>${be}</td>
      <td>${price}</td>
      <td>${n(opt.last)}</td>
      <td>${opt.iv != null ? `<span class="c-opt">${opt.iv.toFixed(1)}%</span>` : '<span class="c-muted">—</span>'}</td>
      <td>${distHtml(s.distance_pct, level, s.risk_direction)}</td>
      <td>${decayHtml(p.premium_collected, opt.last)}</td>
      <td>${badgeHtml(level)}</td>
    </tr>`;
  }).join("");
}

function updateSummary(positions) {
  const c = {OK:0, WARNING:0, CRITICAL:0, BREACHED:0};
  positions.forEach(p => { const l = p.status?.alert_level; if(c[l]!==undefined) c[l]++; });
  document.getElementById("s-total").textContent = positions.length;
  document.getElementById("s-ok").textContent = c.OK;
  document.getElementById("s-warn").textContent = c.WARNING;
  document.getElementById("s-crit").textContent = c.CRITICAL;
  document.getElementById("s-breach").textContent = c.BREACHED;

  const ripe = positions.filter(p => {
    const prem = p.premium_collected;
    const last = p.option_data?.last;
    if (!prem || prem <= 0 || last == null) return false;
    return ((prem - last) / prem) * 100 >= 70;
  }).length;
  document.getElementById("s-ripe").textContent = ripe;

  const banner = document.getElementById("alert-banner");
  const hot = positions.filter(p => ["CRITICAL","BREACHED"].includes(p.status?.alert_level));
  if (hot.length) {
    banner.style.display = "block";
    banner.textContent = "⚠ ALERT: " + hot.map(p => `${p.ticker} ${p.status.alert_level}`).join("  ·  ");
  } else {
    banner.style.display = "none";
  }
}

function handleRefresh() {
  const btn = document.getElementById("refresh-btn");
  if (btn.disabled) return;
  loadData();
}

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> FETCHING...';

  document.getElementById("err").innerHTML = "";
  try {
    const r = await fetch(STATUS_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const ts = new Date(data.updated_at);
    document.getElementById("ts").textContent = "UPDATED " + ts.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const positions = data.positions || [];
    updateSummary(positions);
    document.getElementById("tbody").innerHTML = renderRows(positions);
    document.getElementById("loading").style.display = "none";
    document.getElementById("tbl").style.display = "table";
  } catch(e) {
    document.getElementById("err").innerHTML = `<div class="err">ERROR: ${e.message} — run monitor.py first</div>`;
    document.getElementById("loading").style.display = "none";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "↻ REFRESH";
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
