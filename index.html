<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Proflex Position Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f3f3ee;color:#141c25;min-height:100vh}
  header{background:#141c25;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
  .logo{color:#c9a961;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:0.5px}
  .logo span{color:#f5f5f0;font-family:'Inter',sans-serif;font-size:13px;font-weight:400;margin-left:10px}
  .last-updated{color:#888;font-size:12px}
  main{max-width:1200px;margin:0 auto;padding:32px 24px}
  h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:4px}
  .subtitle{color:#666;font-size:14px;margin-bottom:28px}
  .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
  .card{background:#fff;border-radius:10px;padding:20px 24px;border:1px solid #e5e5e0}
  .card-label{font-size:12px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .card-value{font-size:26px;font-weight:700;font-family:'Playfair Display',serif}
  .card-value.ok{color:#16a34a}
  .card-value.warn{color:#d97706}
  .card-value.crit{color:#dc2626}
  .card-value.breach{color:#7f1d1d}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e5e0}
  thead{background:#141c25}
  th{color:#c9a961;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:14px 16px;text-align:left}
  td{padding:14px 16px;border-bottom:1px solid #f0f0ea;font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf7}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
  .badge-ok{background:#dcfce7;color:#166534}
  .badge-warning{background:#fef3c7;color:#92400e}
  .badge-critical{background:#fee2e2;color:#991b1b}
  .badge-breached{background:#7f1d1d;color:#fff}
  .badge-error{background:#f3f4f6;color:#6b7280}
  .ticker{font-weight:700;font-size:15px}
  .price{font-weight:700;font-size:15px;font-family:'Playfair Display',serif}
  .dist{font-weight:600}
  .dist-safe{color:#16a34a}
  .dist-warn{color:#d97706}
  .dist-crit{color:#dc2626}
  .opt-sub{font-size:11px;color:#999;display:block;margin-top:2px}
  .loading{text-align:center;padding:60px;color:#888}
  .error-msg{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:16px;margin-bottom:24px;color:#991b1b;font-size:14px}
  .refresh-btn{background:#141c25;color:#c9a961;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-left:12px}
  .refresh-btn:hover{background:#1e2d3d}
  .auto-badge{background:#e0f2fe;color:#0369a1;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:500}
  footer{text-align:center;color:#bbb;font-size:12px;padding:32px;margin-top:32px}
</style>
</head>
<body>
<header>
  <div>
    <span class="logo">PROFLEX <span>Position Monitor</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="auto-badge">Auto-refresh 60s</span>
    <span class="last-updated" id="last-updated">Loading...</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <h1>Open Positions</h1>
  <p class="subtitle">Live breakeven monitoring — Growth Gazette &amp; Income Insider</p>

  <div class="summary-bar" id="summary-bar">
    <div class="card"><div class="card-label">Total Positions</div><div class="card-value" id="s-total">—</div></div>
    <div class="card"><div class="card-label">Safe</div><div class="card-value ok" id="s-ok">—</div></div>
    <div class="card"><div class="card-label">Warning</div><div class="card-value warn" id="s-warn">—</div></div>
    <div class="card"><div class="card-label">Critical / Breached</div><div class="card-value crit" id="s-crit">—</div></div>
  </div>

  <div id="error-container"></div>

  <div id="table-container">
    <div class="loading">Fetching positions...</div>
  </div>
</main>

<footer>Proflex Finance · proflexfinance.com · For internal use only</footer>

<script>
const STATUS_URL = "data/status.json";

function badgeClass(level) {
  const map = { OK: "badge-ok", WARNING: "badge-warning", CRITICAL: "badge-critical", BREACHED: "badge-breached", ERROR: "badge-error" };
  return "badge " + (map[level] || "badge-error");
}

function distClass(level) {
  if (level === "OK") return "dist dist-safe";
  if (level === "WARNING") return "dist dist-warn";
  return "dist dist-crit";
}

function formatDist(pct, level, riskDir) {
  if (pct === null || pct === undefined) return "—";
  const sign = pct >= 0 ? "+" : "";
  const arrow = riskDir === "downside"
    ? (pct >= 0 ? "↑" : "↓")
    : (pct >= 0 ? "↓" : "↑");
  return `${arrow} ${sign}${pct.toFixed(1)}%`;
}

function renderTable(positions) {
  if (!positions.length) return "<div class='loading'>No positions found in positions.json</div>";
  const rows = positions.map(p => {
    const s = p.status || {};
    const level = s.alert_level || "ERROR";
    const price = p.current_price != null ? `$${p.current_price.toFixed(2)}` : "—";
    const be = s.breakeven_label || "—";
    const dist = formatDist(s.distance_pct, level, s.risk_direction);
    const opt = p.option_data;
    const optStr = opt ? `<span class="opt-sub">Opt last: $${opt.last} · bid/ask: $${opt.bid}/$${opt.ask} · IV: ${opt.iv}%</span>` : "";
    const strike = p.strike || p.strike_high || "—";
    const strikeStr = p.strategy === "Bull Put Spread"
      ? `$${p.strike_high}/$${p.strike_low}`
      : `$${strike}`;
    const msg = s.message || "";
    return `
      <tr title="${msg.replace(/"/g,"'")}">
        <td><span class="ticker">${p.ticker}</span><span class="opt-sub">${p.newsletter || ""} · ${p.rating || ""}</span></td>
        <td>${p.strategy}</td>
        <td>${strikeStr}</td>
        <td>${p.expiry || "—"}</td>
        <td>$${(p.premium_collected || 0).toFixed(2)}</td>
        <td>${be}</td>
        <td><span class="price">${price}</span>${optStr}</td>
        <td><span class="${distClass(level)}">${dist}</span></td>
        <td><span class="${badgeClass(level)}">${level}</span></td>
      </tr>`;
  }).join("");

  return `
    <table>
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Strategy</th>
          <th>Strike(s)</th>
          <th>Expiry</th>
          <th>Premium</th>
          <th>Breakeven</th>
          <th>Current Price</th>
          <th>Distance</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function updateSummary(positions) {
  const counts = { OK: 0, WARNING: 0, CRITICAL: 0, BREACHED: 0, ERROR: 0 };
  positions.forEach(p => {
    const l = p.status?.alert_level || "ERROR";
    if (counts[l] !== undefined) counts[l]++;
  });
  document.getElementById("s-total").textContent = positions.length;
  document.getElementById("s-ok").textContent = counts.OK;
  document.getElementById("s-warn").textContent = counts.WARNING;
  document.getElementById("s-crit").textContent = counts.CRITICAL + counts.BREACHED;
}

async function loadData() {
  document.getElementById("error-container").innerHTML = "";
  try {
    const r = await fetch(STATUS_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const ts = new Date(data.updated_at);
    document.getElementById("last-updated").textContent = "Updated " + ts.toLocaleTimeString();
    const positions = data.positions || [];
    updateSummary(positions);
    document.getElementById("table-container").innerHTML = renderTable(positions);
  } catch (e) {
    document.getElementById("error-container").innerHTML =
      `<div class="error-msg">Could not load status.json: ${e.message}. Run monitor.py first, then push to GitHub.</div>`;
    document.getElementById("last-updated").textContent = "Error";
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
